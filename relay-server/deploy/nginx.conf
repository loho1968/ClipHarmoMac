# ============================================================
# ClipboardSync 中继服务器 Nginx 配置
# 放置到 /etc/nginx/conf.d/relay.conf
# 作用：WebSocket 反代 + SSL 终结（wss://）
# ============================================================

# 上游 WebSocket 服务
upstream relay_backend {
    server 127.0.0.1:3000;
    keepalive 64;
}

# HTTP → HTTPS 重定向（如有域名+证书）
# server {
#     listen 80;
#     server_name your-domain.com;
#     return 301 https://$host$request_uri;
# }

server {
    # 先用 HTTP 测试（无证书时）
    # 拿到 SSL 证书后改成 443 ssl
    listen 8443;
    # listen 443 ssl http2;
    # server_name your-domain.com;

    # ---- SSL 证书（Let's Encrypt，后续启用） ----
    # ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;

    # 日志
    access_log /var/log/nginx/relay_access.log;
    error_log  /var/log/nginx/relay_error.log;

    # 健康检查
    location /health {
        proxy_pass http://relay_backend/health;
        proxy_http_version 1.1;
    }

    # 状态页面
    location / {
        proxy_pass http://relay_backend/;
        proxy_http_version 1.1;
    }

    # WebSocket
    location /ws {
        proxy_pass http://relay_backend;
        proxy_http_version 1.1;

        # WebSocket 升级头
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时（WebSocket 长连接）
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
